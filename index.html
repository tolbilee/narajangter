<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="나라장터 로켓배달">
    <title>나라장터 로켓배달</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='48'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <h1><span id="title-rocket" class="title-rocket" aria-hidden="true"></span> 나라장터 로켓배달</h1>
            <p id="last-update">마지막 갱신: 불러오는 중...</p>
        </div>
    </header>

    <section class="kpi-row">
        <article class="kpi-card">
            <span id="total-bids-label">최근 7일간 전체 공고</span>
            <strong id="total-bids">0건</strong>
        </article>
        <article class="kpi-card">
            <span id="results-keyword-label">검색 결과</span>
            <strong id="results-count">0건</strong>
        </article>
    </section>

    <main class="workspace">
        <aside class="sidebar">
            <h2>필터</h2>
            <label for="keyword-search">키워드</label>
            <input id="keyword-search" type="text" placeholder="공고명, 기관명">
            <div class="popular-keywords" aria-label="인기 키워드">
                <button type="button" class="kw-chip kw-chip--event" data-keyword="행사"><span class="kw-icon">🎈</span>행사</button>
                <button type="button" class="kw-chip kw-chip--school" data-keyword="학교"><span class="kw-icon">🎓</span>학교</button>
                <button type="button" class="kw-chip kw-chip--expo" data-keyword="전시"><span class="kw-icon">🖼️</span>전시</button>
                <button type="button" class="kw-chip kw-chip--ops" data-keyword="운영"><span class="kw-icon">⚙️</span>운영</button>
            </div>

            <label for="start-date">공고일 시작</label>
            <input id="start-date" type="date">

            <label for="end-date">공고일 종료</label>
            <input id="end-date" type="date">

            <div class="quick-dates">
                <button class="btn btn-primary btn-sm" data-days="7">최근 7일 불러오기</button>
                <button class="btn btn-secondary btn-sm" data-days="30">최근 30일 불러오기</button>
            </div>

            <div class="sidebar-actions">
                <button id="reset-btn" class="btn btn-outline">초기화</button>
            </div>
        </aside>

        <section class="table-zone">
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>데이터를 불러오는 중입니다...</p>
            </div>

            <div id="empty-state" class="empty-state" style="display: none;">
                <h3>검색 결과가 없습니다</h3>
                <p>조건을 조정해 다시 시도해보세요.</p>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>공고명</th>
                            <th>공고기관</th>
                            <th class="sortable" data-sort="notice_date">공고일</th>
                            <th class="sortable" data-sort="bid_date">입찰 마감</th>
                            <th class="sortable" data-sort="bid_amount">추정금액</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody id="bids-list"></tbody>
                </table>
            </div>

            <div id="pagination" class="pagination" style="display: none;">
                <button id="prev-page" class="btn btn-outline">이전</button>
                <div id="page-numbers"></div>
                <button id="next-page" class="btn btn-outline">다음</button>
            </div>
        </section>

        <aside class="detail-zone" id="detail-panel">
            <h2>공고 상세</h2>
            <div id="detail-body"></div>
            <button id="open-detail-btn" class="btn btn-primary" style="display:none;">
                나라장터에서 보기
            </button>
        </aside>
    </main>

    <div id="global-loading" class="global-loading" style="display:none;">
        <div class="global-loading-card">
            <div id="loading-rocket" class="loading-rocket" aria-hidden="true"></div>
            <h3>데이터 동기화 중</h3>
            <p id="global-loading-text">최근 데이터를 정리하고 있습니다...</p>
            <p id="global-loading-eta">예상 남은 시간 계산 중...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
