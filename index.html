<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="나라장터 입찰 공고를 빠르게 탐색하고 갱신하는 실무형 대시보드">
    <title>나라장터 실무 대시보드</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <h1><i class="fas fa-bolt"></i> 나라장터 실무 대시보드</h1>
            <p id="last-update">마지막 갱신: 불러오는 중...</p>
        </div>
        <div class="topbar-actions">
            <select id="refresh-days-select">
                <option value="7">최근 7일 갱신</option>
                <option value="30">최근 30일 갱신</option>
            </select>
            <button id="refresh-data-btn" class="btn btn-primary">
                <i class="fas fa-rotate"></i> 데이터 갱신
            </button>
        </div>
    </header>

    <section class="kpi-row">
        <article class="kpi-card">
            <span>전체 공고</span>
            <strong id="total-bids">0</strong>
        </article>
        <article class="kpi-card">
            <span>진행중</span>
            <strong id="active-bids">0</strong>
        </article>
        <article class="kpi-card">
            <span>오늘 추가</span>
            <strong id="today-bids">0</strong>
        </article>
        <article class="kpi-card">
            <span>현재 필터 결과</span>
            <strong id="results-count">검색결과: 0</strong>
        </article>
    </section>

    <main class="workspace">
        <aside class="sidebar">
            <h2>필터</h2>
            <label for="keyword-search">키워드</label>
            <input id="keyword-search" type="text" placeholder="공고명, 기관명">

            <label for="start-date">공고일 시작</label>
            <input id="start-date" type="date">

            <label for="end-date">공고일 종료</label>
            <input id="end-date" type="date">

            <div class="quick-dates">
                <button class="btn btn-outline btn-sm" data-days="7">최근 7일</button>
                <button class="btn btn-outline btn-sm" data-days="30">최근 30일</button>
            </div>

            <label for="sort-select">정렬</label>
            <select id="sort-select">
                <option value="notice_desc">공고일 (최신순)</option>
                <option value="notice_asc">공고일 (오래된순)</option>
                <option value="bid_desc">마감일 (최신순)</option>
                <option value="bid_asc">마감일 (오래된순)</option>
                <option value="amount_desc">금액 (높은순)</option>
                <option value="amount_asc">금액 (낮은순)</option>
            </select>

            <div class="sidebar-actions">
                <button id="search-btn" class="btn btn-primary">검색</button>
                <button id="apply-filter-btn" class="btn btn-secondary">적용</button>
                <button id="reset-btn" class="btn btn-outline">초기화</button>
            </div>
        </aside>

        <section class="table-zone">
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>데이터를 불러오는 중입니다...</p>
            </div>

            <div id="empty-state" class="empty-state" style="display: none;">
                <h3>검색 결과가 없습니다</h3>
                <p>조건을 조정해 다시 시도해보세요.</p>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>공고명</th>
                            <th>공고기관</th>
                            <th>공고일</th>
                            <th>입찰마감</th>
                            <th>추정금액</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody id="bids-list"></tbody>
                </table>
            </div>

            <div id="pagination" class="pagination" style="display: none;">
                <button id="prev-page" class="btn btn-outline">이전</button>
                <div id="page-numbers"></div>
                <button id="next-page" class="btn btn-outline">다음</button>
            </div>
        </section>

        <aside class="detail-zone" id="detail-panel">
            <h2>공고 상세</h2>
            <p class="detail-placeholder">테이블에서 공고를 선택하면 상세 정보가 표시됩니다.</p>
            <div id="detail-body"></div>
            <button id="open-detail-btn" class="btn btn-primary" style="display:none;">
                나라장터에서 보기
            </button>
        </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
