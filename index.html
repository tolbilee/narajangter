<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and filter public bid notices from the Korea ON-line E-Procurement System.">
    <meta name="keywords" content="KONEPS, bid, tender, notice, public procurement">
    <title>KONEPS Bid Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-gavel"></i>
                    KONEPS Bid Dashboard
                </h1>
                <div class="header-info">
                    <button id="refresh-data-btn" class="btn btn-refresh">
                        <i class="fas fa-sync-alt"></i> Refresh Data
                    </button>
                    <span id="last-update" class="last-update">
                        <i class="fas fa-sync-alt"></i>
                        Last update: loading...
                    </span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <section class="search-section">
                <div class="search-card">
                    <h2 class="section-title">
                        <i class="fas fa-search"></i>
                        Search Bids
                    </h2>

                    <div class="search-group">
                        <label for="keyword-search" class="search-label">
                            <i class="fas fa-keyboard"></i>
                            Keyword
                        </label>
                        <div class="input-group">
                            <input type="text" id="keyword-search" class="search-input" placeholder="Title, notice agency, demand agency...">
                            <button id="search-btn" class="btn btn-primary">
                                <i class="fas fa-search"></i>
                                Search
                            </button>
                        </div>
                    </div>

                    <div class="filter-group">
                        <div class="date-filter">
                            <label for="start-date" class="filter-label">
                                <i class="fas fa-calendar-alt"></i>
                                Notice Date Range
                            </label>
                            <div class="date-inputs">
                                <input type="date" id="start-date" class="date-input">
                                <span class="date-separator">~</span>
                                <input type="date" id="end-date" class="date-input">
                            </div>
                        </div>

                        <div class="quick-dates">
                            <button class="btn btn-secondary btn-sm" data-days="7">Last 7 Days</button>
                            <button class="btn btn-secondary btn-sm" data-days="30">Last 30 Days</button>
                            <button class="btn btn-secondary btn-sm" data-days="90">Last 90 Days</button>
                        </div>
                    </div>

                    <div class="filter-actions">
                        <button id="reset-btn" class="btn btn-outline">
                            <i class="fas fa-redo"></i>
                            Reset
                        </button>
                        <button id="apply-filter-btn" class="btn btn-primary">
                            <i class="fas fa-filter"></i>
                            Apply Filters
                        </button>
                    </div>
                </div>
            </section>

            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">Total Notices</div>
                            <div class="stat-value" id="total-bids">-</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">Open</div>
                            <div class="stat-value" id="active-bids">-</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-calendar-day"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">Added Today</div>
                            <div class="stat-value" id="today-bids">-</div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="results-section">
                <div class="results-header">
                    <h2 class="section-title">
                        <i class="fas fa-list"></i>
                        Bid Notices
                    </h2>
                    <div class="results-info">
                        <span id="results-count" class="results-count">Results: 0</span>
                        <select id="sort-select" class="sort-select">
                            <option value="notice_desc">Notice Date (Newest)</option>
                            <option value="notice_asc">Notice Date (Oldest)</option>
                            <option value="bid_desc">Bid Date (Newest)</option>
                            <option value="bid_asc">Bid Date (Oldest)</option>
                            <option value="amount_desc">Amount (High to Low)</option>
                            <option value="amount_asc">Amount (Low to High)</option>
                        </select>
                    </div>
                </div>

                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading data...</p>
                </div>

                <div id="empty-state" class="empty-state" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <h3>No results found</h3>
                    <p>Try a different keyword or date range.</p>
                </div>

                <div id="bids-list" class="bids-list"></div>

                <div id="pagination" class="pagination" style="display: none;">
                    <button id="prev-page" class="btn btn-pagination" disabled>
                        <i class="fas fa-chevron-left"></i>
                        Previous
                    </button>
                    <div id="page-numbers" class="page-numbers"></div>
                    <button id="next-page" class="btn btn-pagination">
                        Next
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 KONEPS Bid Dashboard. All rights reserved.</p>
                <p class="footer-links">
                    <a href="https://www.g2b.go.kr" target="_blank" rel="noopener">
                        <i class="fas fa-external-link-alt"></i>
                        Open KONEPS
                    </a>
                </p>
            </div>
        </div>
    </footer>

    <div id="bid-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Bid Notice Details</h2>
                <button class="modal-close" onclick="closeBidModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="openBidDetail()">
                    <i class="fas fa-external-link-alt"></i>
                    View in KONEPS
                </button>
                <button class="btn btn-outline" onclick="closeBidModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
