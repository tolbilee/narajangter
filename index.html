<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="나라장터 입찰 정보를 실시간으로 검색하고 필터링하는 서비스">
    <meta name="keywords" content="나라장터, 입찰, 공고, 검색, 필터링">
    <title>나라장터 입찰 정보 시스템</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-gavel"></i>
                    나라장터 입찰 정보
                </h1>
                <div class="header-info">
                    <button id="refresh-data-btn" class="btn btn-refresh">
                        <i class="fas fa-sync-alt"></i> 데이터 업데이트
                    </button>
                    <span id="last-update" class="last-update">
                        <i class="fas fa-sync-alt"></i>
                        마지막 업데이트: 로딩중...
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Search & Filter Section -->
            <section class="search-section">
                <div class="search-card">
                    <h2 class="section-title">
                        <i class="fas fa-search"></i>
                        입찰 정보 검색
                    </h2>
                    
                    <!-- Keyword Search -->
                    <div class="search-group">
                        <label for="keyword-search" class="search-label">
                            <i class="fas fa-keyboard"></i>
                            키워드 검색
                        </label>
                        <div class="input-group">
                            <input 
                                type="text" 
                                id="keyword-search" 
                                class="search-input" 
                                placeholder="입찰명, 공고기관, 수요기관 검색..."
                            >
                            <button id="search-btn" class="btn btn-primary">
                                <i class="fas fa-search"></i>
                                검색
                            </button>
                        </div>
                    </div>

                    <!-- Date Filter -->
                    <div class="filter-group">
                        <div class="date-filter">
                            <label for="start-date" class="filter-label">
                                <i class="fas fa-calendar-alt"></i>
                                공고일 기간
                            </label>
                            <div class="date-inputs">
                                <input 
                                    type="date" 
                                    id="start-date" 
                                    class="date-input"
                                >
                                <span class="date-separator">~</span>
                                <input 
                                    type="date" 
                                    id="end-date" 
                                    class="date-input"
                                >
                            </div>
                        </div>

                        <!-- Quick Date Buttons -->
                        <div class="quick-dates">
                            <button class="btn btn-secondary btn-sm" data-days="7">최근 7일</button>
                            <button class="btn btn-secondary btn-sm" data-days="30">최근 30일</button>
                            <button class="btn btn-secondary btn-sm" data-days="90">최근 90일</button>
                        </div>
                    </div>

                    <!-- Filter Actions -->
                    <div class="filter-actions">
                        <button id="reset-btn" class="btn btn-outline">
                            <i class="fas fa-redo"></i>
                            초기화
                        </button>
                        <button id="apply-filter-btn" class="btn btn-primary">
                            <i class="fas fa-filter"></i>
                            필터 적용
                        </button>
                    </div>
                </div>
            </section>

            <!-- Statistics Section -->
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">전체 공고</div>
                            <div class="stat-value" id="total-bids">-</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">진행중</div>
                            <div class="stat-value" id="active-bids">-</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-calendar-day"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-label">오늘 등록</div>
                            <div class="stat-value" id="today-bids">-</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section">
                <div class="results-header">
                    <h2 class="section-title">
                        <i class="fas fa-list"></i>
                        입찰 공고 목록
                    </h2>
                    <div class="results-info">
                        <span id="results-count" class="results-count">검색 결과: 0건</span>
                        <select id="sort-select" class="sort-select">
                            <option value="notice_desc">공고일 최신순</option>
                            <option value="notice_asc">공고일 오래된순</option>
                            <option value="bid_desc">입찰일 최신순</option>
                            <option value="bid_asc">입찰일 오래된순</option>
                            <option value="amount_desc">예정가격 높은순</option>
                            <option value="amount_asc">예정가격 낮은순</option>
                        </select>
                    </div>
                </div>

                <!-- Loading Spinner -->
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>데이터를 불러오는 중...</p>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <h3>검색 결과가 없습니다</h3>
                    <p>다른 키워드나 날짜로 검색해보세요.</p>
                </div>

                <!-- Bids List -->
                <div id="bids-list" class="bids-list">
                    <!-- Bid cards will be dynamically inserted here -->
                </div>

                <!-- Pagination -->
                <div id="pagination" class="pagination" style="display: none;">
                    <button id="prev-page" class="btn btn-pagination" disabled>
                        <i class="fas fa-chevron-left"></i>
                        이전
                    </button>
                    <div id="page-numbers" class="page-numbers">
                        <!-- Page numbers will be dynamically inserted here -->
                    </div>
                    <button id="next-page" class="btn btn-pagination">
                        다음
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 나라장터 입찰 정보 시스템. All rights reserved.</p>
                <p class="footer-links">
                    <a href="https://www.g2b.go.kr" target="_blank" rel="noopener">
                        <i class="fas fa-external-link-alt"></i>
                        나라장터 바로가기
                    </a>
                </p>
            </div>
        </div>
    </footer>

    <!-- Modal for Bid Details -->
    <div id="bid-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">입찰 공고 상세</h2>
                <button class="modal-close" onclick="closeBidModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Modal content will be dynamically inserted here -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="openBidDetail()">
                    <i class="fas fa-external-link-alt"></i>
                    나라장터에서 보기
                </button>
                <button class="btn btn-outline" onclick="closeBidModal()">닫기</button>
            </div>
        </div>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Application Scripts -->
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
